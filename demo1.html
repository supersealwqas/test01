<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaflet地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <input type="file" name="JsonName" id="fileID"/>
    <div id="mapid" style="width: 600px;height: 400px;"></div>
    <style>
        #fileID{
            position: absolute;
            top: 20px;
            left: 60px;
            cursor: pointer;
            z-index: 500;
        }
    </style>
    <script>
        var myMap=L.map('mapid',{
            center:[30.55,114.3],
            zoom:10
        });
        L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
            attribution: '&copy; 高德地图',
            subdomains: ['1','2','3','4'],
            maxZoom: 18,
            minZoom: 0
        }).addTo(myMap);
        var geojsonFeature={
            'type':'Feature',
            'properties':{
                "名称":"中国地质大学（武汉）未来城校区",
            },
            'geometry':{
                'type':'Point',
                'coordinates':[114.61225032806398,30.45973503762294]
            }
        };
        L.geoJSON(geojsonFeature).addTo(myMap);
        fetch("CUG_WGS84.json")
            .then(function(res){ return res.json(); })
            .then(function(data){ L.geoJSON(data).addTo(myMap); });
        var fileInput=document.getElementById("fileID");
        fileInput.onchange=function(e){
            var files=e.target.files;
            if(files && files.length>0){
            
            var reader=new FileReader();
            reader.readAsText(files[0],"UTF-8");
            reader.onload=function(evt){
                var fileString=evt.target.result;
                var jsonFile=JSON.parse(fileString);
                L.geoJSON(jsonFile).addTo(myMap);
            };
            reader.onerror=function(evt){
                console.error("GeoJSON数据读取失败！错误代码："+event.target.error.code);
            };
        }
        }
    </script>
</body>
</html>
